<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #000000;
      position: relative;
    }

    .bg-photo {
      position: absolute;
      inset: 0;
      background-image: url('__BG_URL__');
      background-size: cover;
      background-position: center 30%;
      z-index: 0;
    }

    .overlay-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 260px;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.45) 60%,
        rgba(0,0,0,0.00) 100%
      );
      z-index: 1;
    }

    .overlay-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 750px;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.00) 0%,
        rgba(0,0,0,0.78) 38%,
        rgba(0,0,0,0.97) 100%
      );
      z-index: 1;
    }

    .frame {
      position: absolute;
      inset: 0;
      border: 10px solid #c4170c;
      z-index: 100;
      pointer-events: none;
    }

    .logo {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      height: 110px;
      width: auto;
    }

    .content-block {
      position: absolute;
      bottom: 90px;
      left: 72px;
      width: 936px;
      z-index: 10;
    }

    .tag {
      display: inline-block;
      background: #c4170c;
      color: #ffffff;
      padding: 10px 22px;
      margin-bottom: 22px;
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .title {
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: 72px;
      line-height: 1.06;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>
  <div class="frame"></div>

  <img class="logo" src="__LOGO_SRC__" alt="PY Diário">

  <div class="content-block">
    <div class="tag">POLÍTICA</div>
    <div class="title">Paraguay crece 4,2%:<br>el FMI confirma que<br>somos los mejores<br>de la región</div>
  </div>
</body>
</html>
